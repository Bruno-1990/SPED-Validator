# Aliquotas interestaduais de referencia (para calculo DIFAL)
interestaduais:
  padrao_sul_sudeste: 12.0  # origem S/SE (exceto ES) para N/NE/CO/ES
  padrao_demais: 7.0        # origem N/NE/CO/ES para S/SE (exceto ES)
  importados: 4.0           # produtos importados (Resolucao SF 13/2012)

  # UFs consideradas Sul/Sudeste para fins de aliquota interestadual
  sul_sudeste:
    - SP
    - RJ
    - MG
    - PR
    - SC
    - RS
  # Nota: ES, embora Sudeste, usa 12% como origem (equiparado aos demais)
