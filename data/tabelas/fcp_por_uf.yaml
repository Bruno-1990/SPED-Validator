# Fundo de Combate a Pobreza (FCP/FECP/FECOP/FECEP) por UF - Vigencia 2026
# Fonte: legislacao estadual consolidada
# Ultima atualizacao: 2026-04-05
# Nota: Nem todos os estados possuem FCP. Alguns embutem no modal, outros cobram adicional separado.

vigencia: "2026-01-01"

# Tipo de aplicacao:
#   embutido  = ja esta incluido na aliquota modal (nao soma, apenas destaca)
#   adicional = soma-se a aliquota interna para formar aliquota efetiva
#   nenhum    = estado nao possui FCP

