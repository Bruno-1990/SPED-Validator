meta:
  fonte: "Tabela 5.1.1 - Codigos de Ajuste da Apuracao do ICMS (SPED EFD)"
  ultima_revisao: "2026-04-06"
  avisos:
    - "Codigos mais frequentes por UF - nao exaustivo"
    - "Consulte o portal do SPED para tabela oficial completa por UF"
    - "Formato do codigo: UUxNNNNN (UU=UF, x=tipo, NNNNN=sequencial)"
  tipos_ajuste:
    "0": "Debito especial"
    "1": "Estorno de credito"
    "2": "Outros debitos"
    "3": "Credito presumido"
    "4": "Estorno de debito"
    "5": "Outros creditos"

# Codigos de ajuste organizados por UF
# Tipo 0=debito especial, 1=estorno credito, 2=outros debitos
# Tipo 3=credito presumido, 4=estorno debito, 5=outros creditos
ajustes:
