      tipo: "0"
      descricao: "Debito especial - DIFAL EC 87/2015"
    - codigo: "SP020001"
      tipo: "2"
      descricao: "Outros debitos - ICMS-ST antecipacao"
    - codigo: "SP020002"
      tipo: "2"
      descricao: "Outros debitos - restituicao/complementacao ICMS-ST"
    - codigo: "SP020003"
      tipo: "2"
      descricao: "Outros debitos - antecipacao tributaria art. 426-A RICMS"
    - codigo: "SP030001"
      tipo: "3"
      descricao: "Credito presumido - estabelecimento fabricante"
    - codigo: "SP030002"
      tipo: "3"
      descricao: "Credito presumido - saida interestadual"
    - codigo: "SP050001"
      tipo: "5"
      descricao: "Outros creditos - ICMS pago antecipadamente por ST"
    - codigo: "SP050002"
      tipo: "5"
      descricao: "Outros creditos - credito acumulado transferido"
    - codigo: "SP050003"
      tipo: "5"
