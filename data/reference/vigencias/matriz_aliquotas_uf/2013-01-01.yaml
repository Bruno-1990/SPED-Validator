meta:
  fonte: "Resolucao do Senado 13/2012 + CONFAZ"
  vigencia_de: "2013-01-01"
  vigencia_ate: null
  ultima_revisao: "2026-04-06"
  avisos:
    - "Aliquotas interestaduais conforme RS 13/2012"
    - "4% para produtos importados (conteudo de importacao > 40%)"
    - "Diagonal da matriz (mesma UF) nao se aplica aliquota interestadual"

# Aliquotas interestaduais padrao por regiao de origem
# Sul/Sudeste (exceto ES) para Norte/Nordeste/Centro-Oeste/ES: 7%
# Demais combinacoes: 12%
# Importados: 4% (tratado separadamente)

# Regra geral:
# Origem Sul/Sudeste (SP,RJ,MG,PR,RS,SC) -> Destino N/NE/CO/ES: 7%
# Qualquer outra combinacao interestadual: 12%

sul_sudeste: ['SP', 'RJ', 'MG', 'PR', 'RS', 'SC']
demais: ['AC', 'AL', 'AM', 'AP', 'BA', 'CE', 'DF', 'ES', 'GO', 'MA', 'MS', 'MT', 'PA', 'PB', 'PE', 'PI', 'RN', 'RO', 'RR', 'SE', 'TO']

# Para lookup direto, use a logica:
# se origem in sul_sudeste AND destino in demais -> 7.0
# se origem != destino -> 12.0
# se origem == destino -> None (nao interestadual)
aliquota_importados: 4.0
