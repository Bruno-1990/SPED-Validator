meta:
  fonte: "Convenios ICMS/CONFAZ e Protocolos ICMS - MVA-ST por segmento"
  ultima_revisao: "2026-04-06"
  avisos:
    - "MVA original (operacao interna). Para interestadual, aplicar MVA ajustado"
    - "Formula MVA ajustado: [(1+MVA-ST original) x (1-ALQ inter)/(1-ALQ intra)] - 1"
    - "Valores podem ser alterados por Convenios/Protocolos - consulte legislacao vigente"
    - "Lista com segmentos mais comuns sujeitos a ST"

