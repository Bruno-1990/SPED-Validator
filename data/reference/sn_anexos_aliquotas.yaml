meta:
  fonte: 'Lei Complementar 123/2006 + LC 155/2016 (valores oficiais)'
  vigencia_de: '2018-01-01'
  vigencia_ate: null
  descricao: >
    Tabelas de aliquotas progressivas do Simples Nacional por Anexo.
    Aliquota Efetiva = ((RBT12 * Aliquota Nominal) - PD) / RBT12

limite_anual_sn: 4800000.00

formula:
  descricao: "Calculo da aliquota efetiva"
  formula: "((RBT12 * aliquota_nominal) - parcela_deduzir) / RBT12"

# Limites de pCredSN (aliquota de credito ICMS para CSOSN 101/201)
# calculados a partir das faixas: aliq_efetiva * pct_ICMS
# Usado para validacao SN_003 sem conhecer o RBT12
credito_icms:
  pCredSN_max: 0.0401   # 4,01% - teto absoluto (Anexo II, F5, inicio)
  pCredSN_tipico_max: 0.0200  # 2,00% - acima disso merece alerta

