efeitos_estouro:
  descricao: >
    Quando a RBT12 supera o sublimite da UF, ICMS e ISS sao excluidos
    do DAS a partir do 1o dia do mes seguinte ao trimestre do excesso.
    A empresa continua optante do SN para tributos federais.
