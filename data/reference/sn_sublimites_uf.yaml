meta:
  fonte: 'Resolucao CGSN no 140/2018, art. 9o'
  vigencia_de: '2018-01-01'
  vigencia_ate: null
  descricao: >
    Sublimites de receita bruta anual para recolhimento de ICMS/ISS
    dentro do DAS. Empresas que ultrapassam o sublimite da UF devem
    recolher ICMS/ISS separadamente, fora do DAS.

