version: "3.9"

services:
  api:
    build:
      context: .
      target: backend
    ports:
      - "8020:8020"
    volumes:
      - db-data:/app/db
      - ./src:/app/src
      - ./api:/app/api
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn api.main:app --host 0.0.0.0 --port 8020 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "5175:5175"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://api:8020

volumes:
  db-data:
