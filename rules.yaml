- id: AUD_BENEFICIO_PARAMETRIZACAO_ERRADA
  register: C170, C190, E111
  fields:
  - CST_ICMS
  - ALIQ_ICMS
  - COD_AJ_APUR
  error_type: BENEFICIO_EXECUCAO_INCORRETA
  severity: critical
  description: Beneficio autorizado mas executado com parametrizacao incompativel no SPED
  condition: E111 presente mas CST/ALIQ/CFOP incompativeis com modelo do regime
  implemented: true
  module: beneficio_audit_validator.py
  tipo_achado: risco_fiscal
- id: AUD_DESTINATARIO_SEGREGACAO
  register: C170, 0150, E111
  fields:
  - COD_PART
  - UF
  - IE
  error_type: BENEFICIO_SEM_SEGREGACAO_DESTINATARIO
  severity: warning
  description: Calculo do beneficio sem segregacao por tipo de destinatario
  condition: E111 com beneficio AND mistura de contribuintes/nao contribuintes/filiais na base
  implemented: true
  module: beneficio_audit_validator.py
  tipo_achado: indicio
- id: AUD_BASE_BENEFICIO_INFLADA
  register: C100, C170, C190, E111
  fields:
  - CFOP
  - COD_SIT
  - VL_AJ_APUR
  error_type: BASE_BENEFICIO_INFLADA
  severity: critical
  description: Base do beneficio com devolucoes, remessas, cancelamentos ou operacoes excluidas
  condition: E111 ajuste desproporcional ao volume de operacoes elegiveis liquidas
  implemented: true
  module: beneficio_audit_validator.py
  tipo_achado: risco_fiscal
- id: AUD_SPED_VS_CONTRIBUICOES
  register: C170, C190
  fields:
  - CST_PIS
  - CST_COFINS
  - VL_PIS
  - VL_COFINS
  error_type: SPED_CONTRIBUICOES_DIVERGENTE
  severity: warning
  description: Inconsistencia entre SPED Fiscal e EFD-Contribuicoes no tratamento de receitas
  condition: CSTs PIS/COFINS divergentes entre obrigacoes OU faturamento incompativel
  implemented: true
  module: beneficio_audit_validator.py
  tipo_achado: inconsistencia
  depende_validacao_externa: true
  validar_externamente: EFD-Contribuicoes
- id: AUD_FORMA_VS_SUBSTANCIA
  register: C170, 0200
  fields:
  - CFOP
  - COD_ITEM
  - CST_ICMS
  error_type: CREDITO_FORMA_SEM_SUBSTANCIA
  severity: warning
  description: Escrituracao formalmente correta mas credito incompativel com destinacao real do item
  condition: CFOP comercializacao AND item nunca vendido AND NCM indica uso/consumo
  implemented: true
  module: audit_rules.py
  tipo_achado: indicio
- id: AUD_E111_NUMERICO_JURIDICO
  register: E111, E112, E113
  fields:
  - COD_AJ_APUR
  - VL_AJ_APUR
  error_type: AJUSTE_NUMERICO_SEM_VALIDADE_JURIDICA
  severity: critical
  description: Ajuste fecha numericamente mas usa codigo inadequado ou sem fundamento
  condition: E111 fecha com E110 mas COD_AJ_APUR generico ou expirado
  implemented: true
  module: beneficio_audit_validator.py
  tipo_achado: risco_fiscal
- id: AUD_IPI_REFLEXO_CUSTO_BC
  register: C170
  fields:
  - VL_IPI
  - VL_BC_ICMS
  - CST_IPI
  error_type: IPI_REFLEXO_INCORRETO
  severity: warning
  description: IPI tratado incorretamente no credito, custo ou BC do ICMS
  condition: IPI nao recuperavel nao incluido na BC ICMS ou vice-versa
  implemented: true
  module: audit_rules.py
  tipo_achado: inconsistencia
- id: AUD_CODIGO_AJUSTE_INCOMPATIVEL
  register: E111, E112
  fields:
  - COD_AJ_APUR
  error_type: CODIGO_AJUSTE_INCOMPATIVEL
  severity: critical
  description: Codigo de ajuste incompativel com beneficio, natureza ou vigencia
  condition: COD_AJ_APUR nao corresponde ao beneficio autorizado ou esta expirado
  implemented: true
  module: beneficio_audit_validator.py
  tipo_achado: risco_fiscal
- id: AUD_TRILHA_BENEFICIO_AUSENTE
  register: C190, E110, E111, E112, E113
  fields:
  - VL_ICMS
  - VL_AJ_APUR
  - CHV_DOC
  error_type: TRILHA_BENEFICIO_AUSENTE
  severity: critical
  description: Beneficio sem trilha de auditoria entre operacao, base e ajuste
  condition: E111 com ajuste relevante AND sem vinculo documental E112/E113
  implemented: true
  module: beneficio_audit_validator.py
  tipo_achado: risco_fiscal
- id: AUD_CLASSIFICACAO_ERRO
  register: '*'
  fields:
  - '*'
  error_type: CLASSIFICACAO_TIPO_ERRO
  severity: info
  description: 'Meta-regra: classificar achado como erro material, parametrizacao ou tese fiscal'
  condition: Padrao do erro indica natureza pontual, sistemica ou interpretativa
  implemented: true
  module: beneficio_audit_validator.py
  tipo_achado: metarregra
- id: AUD_ESCOPO_APENAS_SPED
  register: C170, C190, E110, E111, 0150, 0200, H010, 9900
  fields:
  - '*'
  error_type: ACHADO_LIMITADO_AO_SPED
  severity: info
  description: 'Meta-regra: informar que achado depende apenas do SPED.txt sem documentos externos'
  condition: Regra sustentavel apenas por dados internos do arquivo
  implemented: true
  module: beneficio_audit_validator.py
  tipo_achado: metarregra
- id: AUD_CHECKLIST_MESTRE
  register: 0150, 0200, C170, C190, E110, E111, H010, 9900
  fields:
  - '*'
  error_type: CHECKLIST_AUDITORIA_INCOMPLETO
  severity: critical
  description: 'Checklist mestre: 10 pontos minimos de auditoria SPED'
  condition: Ausencia de conferencia nos pilares minimos (cadastral, CST/CFOP, recalculo, C170xC190, E110, E111, monofasicos,
    beneficio, inventario, integridade)
  implemented: true
  module: audit_rules.py
  tipo_achado: metarregra
aliquotas:
- id: ALIQ_001
  register: C170
  fields:
  - CFOP
  - ALIQ_ICMS
  error_type: ALIQ_INTERESTADUAL_INVALIDA
  severity: critical
  description: Operacao interestadual com aliquota fora do padrao (4/7/12)
  condition: CFOP 6xxx AND CST tributado AND ALIQ not in {4,7,12}
  implemented: true
  module: aliquota_validator.py
  legislation: Resolucao Senado 22/1989, RS 13/2012
- id: ALIQ_002
  register: C170
  fields:
  - CFOP
  - ALIQ_ICMS
  error_type: ALIQ_INTERNA_EM_INTERESTADUAL
  severity: critical
  description: Aliquota interna usada em operacao interestadual (>= 17%)
  condition: CFOP 6xxx AND ALIQ >= 17
  implemented: true
  module: aliquota_validator.py
- id: ALIQ_003
  register: C170
  fields:
  - CFOP
  - ALIQ_ICMS
  - UF
  error_type: ALIQ_INTERESTADUAL_EM_INTERNA
  severity: warning
  description: Aliquota interestadual usada em operacao interna
  condition: CFOP 5xxx AND ALIQ in {4,7,12} AND mesma UF
  implemented: true
  module: aliquota_validator.py
- id: ALIQ_007
  register: C190
  fields:
  - ALIQ_ICMS
  - CST_ICMS
  - CFOP
  error_type: ALIQ_MEDIA_INDEVIDA
  severity: critical
  description: Aliquota media indevida no C190 nao suportada pelos itens
  condition: C190.ALIQ intermediaria entre min e max dos C170 do documento
  implemented: true
  module: aliquota_validator.py
c190_consolidacao:
- id: C190_001
  register: C190
  fields:
  - VL_OPR
  - VL_BC_ICMS
  - VL_ICMS
  error_type: C190_DIVERGE_C170
  severity: critical
  description: C190 nao fecha com soma dos C170 por CST+CFOP+ALIQ
  condition: sum(C170 por CST+CFOP+ALIQ) != C190
  implemented: true
  module: c190_validator.py
- id: C190_002
  register: C190
  fields:
  - CST_ICMS
  - CFOP
  - ALIQ_ICMS
  error_type: C190_COMBINACAO_INCOMPATIVEL
  severity: warning
  description: Combinacao incompativel de CST+CFOP+ALIQ no C190
  condition: CST isento com ALIQ>0, CST tributado com ALIQ=0, CFOP inter com ALIQ interna
  implemented: true
  module: c190_validator.py
cst_expandido:
- id: CST_003
  register: C170
  fields:
  - CST_ICMS
  - VL_BC_ICMS
  - VL_ITEM
  error_type: CST_020_SEM_REDUCAO
  severity: warning
  description: CST 020 sem reducao real de base de calculo
  condition: CST 020 AND VL_BC_ICMS >= 95% de VL_ITEM
  implemented: true
  module: cst_validator.py
- id: IPI_003
  register: C170
  fields:
  - CST_IPI
  - VL_BC_IPI
  - ALIQ_IPI
  - VL_IPI
  error_type: IPI_CST_INCOMPATIVEL
  severity: error
  description: CST IPI incompativel com campos monetarios
  condition: CST tributado com tudo zero OU CST isento com valores > 0
  implemented: true
  module: cst_validator.py
