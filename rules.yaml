version: '1.0'
tolerance: 0.02
formato:
- id: FMT_CNPJ
  register: '*'
  fields:
  - CNPJ
  error_type: FORMATO_INVALIDO
  severity: error
  description: CNPJ deve ter 14 digitos numericos com digitos verificadores validos (modulo 11)
  condition: len(CNPJ) != 14 OR digitos iguais OR DV invalido
  implemented: true
  module: format_validator.py
- id: FMT_CPF
  register: '*'
  fields:
  - CPF
  error_type: FORMATO_INVALIDO
  severity: error
  description: CPF deve ter 11 digitos numericos com digitos verificadores validos (modulo 11)
  condition: len(CPF) != 11 OR digitos iguais OR DV invalido
  implemented: true
  module: format_validator.py
- id: FMT_DATA
  register: '*'
  fields:
  - DT_DOC
  - DT_E_S
  - DT_INI
  - DT_FIN
  error_type: INVALID_DATE
  severity: error
  description: Datas devem estar no formato DDMMAAAA com valores validos
  condition: len != 8 OR ano < 1900 OR ano > 2100 OR dia/mes invalido
  implemented: true
  module: format_validator.py
- id: FMT_DATA_PERIODO
  register: C100, C170
  fields:
  - DT_DOC
  - DT_E_S
  error_type: DATE_OUT_OF_PERIOD
  severity: warning
  description: Data deve estar dentro do periodo DT_INI..DT_FIN do registro 0000
  condition: data < DT_INI OR data > DT_FIN
  implemented: true
  module: format_validator.py
- id: FMT_CEP
  register: '*'
  fields:
  - CEP
  error_type: FORMATO_INVALIDO
  severity: error
  description: CEP deve ter 8 digitos numericos e nao ser 00000000
  condition: len(CEP) != 8 OR CEP == '00000000'
  implemented: true
  module: format_validator.py
- id: FMT_CFOP
  register: C170, D100
  fields:
  - CFOP
  error_type: FORMATO_INVALIDO
  severity: error
  description: CFOP deve ter 4 digitos, primeiro digito entre 1 e 7
  condition: nao bate com [1-7]\d{3}
  implemented: true
  module: format_validator.py
- id: FMT_NCM
  register: C170
  fields:
  - NCM
  error_type: FORMATO_INVALIDO
  severity: error
  description: NCM deve ter 8 digitos numericos
  condition: len(NCM) != 8 OR nao numerico
  implemented: true
  module: format_validator.py
- id: FMT_CHAVE_NFE
  register: C100
  fields:
  - CHV_NFE
  error_type: FORMATO_INVALIDO
  severity: error
  description: Chave NFe deve ter 44 digitos com DV modulo 11 valido
  condition: len != 44 OR DV invalido (pesos 2-9 ciclicos)
  implemented: true
  module: format_validator.py
- id: FMT_COD_MUNICIPIO
  register: '*'
  fields:
  - COD_MUN
  error_type: FORMATO_INVALIDO
  severity: error
  description: Codigo municipio IBGE deve ter 7 digitos, primeiro digito 1-5
  condition: len != 7 OR primeiro digito nao em (1-5)
  implemented: true
  module: format_validator.py
campo_a_campo:
- id: CAMPO_OBRIGATORIO
  register: '*'
  fields:
  - '*'
  error_type: MISSING_REQUIRED
  severity: error
  description: Campo marcado como obrigatorio (O) deve estar preenchido
  condition: required='O' AND (campo ausente OR valor vazio)
  implemented: true
  module: validator.py
- id: CAMPO_TIPO_NUMERICO
  register: '*'
  fields:
  - '*'
  error_type: WRONG_TYPE
  severity: error
  description: Campo tipo N (numerico) deve conter valor numerico valido
  condition: field_type='N' AND valor nao parseavel como float
  implemented: true
  module: validator.py
- id: CAMPO_TAMANHO
  register: '*'
  fields:
  - '*'
  error_type: WRONG_SIZE
  severity: error
  description: Valor do campo nao pode exceder tamanho maximo definido
  condition: len(valor) > field_size
  implemented: true
  module: validator.py
- id: CAMPO_VALOR_VALIDO
  register: '*'
  fields:
  - '*'
  error_type: INVALID_VALUE
  severity: error
  description: Valor deve estar na lista de valores permitidos
  condition: valid_values definido AND valor nao esta na lista
  implemented: true
  module: validator.py
intra_registro:
- id: C100_DT_ES_OBRIGATORIA_ENTRADA
  register: C100
  fields:
  - DT_E_S
  - IND_OPER
  - COD_SIT
  error_type: MISSING_CONDITIONAL
  severity: warning
  description: Entrada (IND_OPER=0) com documento regular exige DT_E_S preenchida
  condition: IND_OPER='0' AND COD_SIT in ('00','01','') AND DT_E_S vazio
  implemented: true
  module: intra_register_validator.py
- id: C100_CANCELADA_VALOR_ZERO
  register: C100
  fields:
  - VL_DOC
  - COD_SIT
  error_type: INCONSISTENCY
  severity: error
  description: Documento cancelado/inutilizado deve ter VL_DOC = 0
  condition: COD_SIT in ('02','03','04') AND VL_DOC > 0
  implemented: true
  module: intra_register_validator.py
- id: C100_ORDEM_DATAS
  register: C100
  fields:
  - DT_DOC
  - DT_E_S
  error_type: DATE_ORDER
  severity: warning
  description: DT_DOC deve ser anterior ou igual a DT_E_S
  condition: DT_DOC > DT_E_S (ambas preenchidas)
  implemented: true
  module: intra_register_validator.py
- id: C170_CFOP_VS_OPERACAO
  register: C170
  fields:
  - CFOP
  - IND_OPER
  error_type: CFOP_MISMATCH
  severity: error
  description: CFOP do item deve ser compativel com tipo de operacao do C100 pai
  condition: IND_OPER=0 AND CFOP inicia com 5/6/7; OU IND_OPER=1 AND CFOP inicia com 1/2/3
  implemented: true
  module: intra_register_validator.py
- id: C190_SOMA_VL_OPR
  register: C190
  fields:
  - VL_OPR
  error_type: SOMA_DIVERGENTE
  severity: critical
  description: VL_OPR do C190 deve ser igual a soma dos VL_ITEM dos C170 com mesmo CFOP
  condition: '|soma(C170.VL_ITEM) - C190.VL_OPR| > tolerancia'
  implemented: true
  module: intra_register_validator.py
- id: C190_SOMA_VL_BC_ICMS
  register: C190
  fields:
  - VL_BC_ICMS
  error_type: SOMA_DIVERGENTE
  severity: critical
  description: VL_BC_ICMS do C190 deve ser igual a soma dos C170 com mesmo CFOP
  condition: '|soma(C170.VL_BC_ICMS) - C190.VL_BC_ICMS| > tolerancia'
  implemented: true
  module: intra_register_validator.py
- id: C190_SOMA_VL_ICMS
  register: C190
  fields:
  - VL_ICMS
  error_type: SOMA_DIVERGENTE
  severity: critical
  description: VL_ICMS do C190 deve ser igual a soma dos C170 com mesmo CFOP
  condition: '|soma(C170.VL_ICMS) - C190.VL_ICMS| > tolerancia'
  implemented: true
  module: intra_register_validator.py
- id: E110_SALDO_APURADO
  register: E110
  fields:
  - VL_SLD_APURADO
  - VL_TOT_DEBITOS
  - VL_TOT_CREDITOS
  error_type: CALCULO_DIVERGENTE
  severity: critical
  description: VL_SLD_APURADO = (debitos + ajustes) - (creditos + ajustes + saldo anterior)
  condition: '|calculado - declarado| > tolerancia'
  implemented: true
  module: intra_register_validator.py
- id: E110_ICMS_RECOLHER
  register: E110
  fields:
  - VL_ICMS_RECOLHER
  - VL_SLD_APURADO
  - VL_TOT_DED
  error_type: CALCULO_DIVERGENTE
  severity: critical
  description: 'Se saldo > 0: VL_ICMS_RECOLHER = VL_SLD_APURADO - VL_TOT_DED'
  condition: VL_SLD_APURADO > 0 AND |calculado - declarado| > tolerancia
  implemented: true
  module: intra_register_validator.py
- id: E110_SALDO_CREDOR
  register: E110
  fields:
  - VL_SLD_CREDOR_TRANSPORTAR
  - VL_SLD_APURADO
  error_type: CALCULO_DIVERGENTE
  severity: critical
  description: 'Se saldo <= 0: VL_SLD_CREDOR_TRANSPORTAR = abs(VL_SLD_APURADO)'
  condition: VL_SLD_APURADO <= 0 AND |calculado - declarado| > tolerancia
  implemented: true
  module: intra_register_validator.py
cruzamento:
- id: REF_COD_PART_C100
  register: C100
  fields:
  - COD_PART
  error_type: REF_INEXISTENTE
  severity: warning
  description: COD_PART do C100 deve existir no cadastro 0150
  condition: COD_PART nao encontrado em nenhum registro 0150
  implemented: true
  module: cross_block_validator.py
- id: REF_COD_ITEM_C170
  register: C170
  fields:
  - COD_ITEM
  error_type: REF_INEXISTENTE
  severity: warning
  description: COD_ITEM do C170 deve existir no cadastro 0200
  condition: COD_ITEM nao encontrado em nenhum registro 0200
  implemented: true
  module: cross_block_validator.py
- id: REF_COD_PART_D100
  register: D100
  fields:
  - COD_PART
  error_type: REF_INEXISTENTE
  severity: warning
  description: COD_PART do D100 deve existir no cadastro 0150
  condition: COD_PART nao encontrado em nenhum registro 0150
  implemented: true
  module: cross_block_validator.py
- id: E110_VS_C190_DEBITOS
  register: E110
  fields:
  - VL_TOT_DEBITOS
  error_type: CRUZAMENTO_DIVERGENTE
  severity: critical
  description: VL_TOT_DEBITOS do E110 = soma VL_ICMS dos C190 com CFOP de saida (5/6/7xxx)
  condition: '|soma(C190+D690 saida) - E110.VL_TOT_DEBITOS| > tolerancia'
  implemented: true
  module: cross_block_validator.py
- id: E110_VS_C190_CREDITOS
  register: E110
  fields:
  - VL_TOT_CREDITOS
  error_type: CRUZAMENTO_DIVERGENTE
  severity: critical
  description: VL_TOT_CREDITOS do E110 = soma VL_ICMS dos C190 com CFOP de entrada (1/2/3xxx)
  condition: '|soma(C190+D690 entrada) - E110.VL_TOT_CREDITOS| > tolerancia'
  implemented: true
  module: cross_block_validator.py
- id: BLOCO9_CONTAGEM_REGISTROS
  register: '9900'
  fields:
  - REG_NAME
  - QTD_REG
  error_type: CONTAGEM_DIVERGENTE
  severity: critical
  description: Quantidade declarada no 9900 deve bater com contagem real do registro
  condition: contagem_real(REG_NAME) != QTD_REG
  implemented: true
  module: cross_block_validator.py
- id: BLOCO9_TOTAL_LINHAS
  register: '9999'
  fields:
  - QTD_LIN
  error_type: CONTAGEM_DIVERGENTE
  severity: critical
  description: QTD_LIN do 9999 deve ser igual ao total de linhas do arquivo
  condition: total_linhas_real != QTD_LIN
  implemented: true
  module: cross_block_validator.py
recalculo:
- id: RECALC_ICMS_BC
  register: C170
  fields:
  - VL_BC_ICMS
  - VL_ITEM
  - VL_DESC
  error_type: CALCULO_DIVERGENTE
  severity: critical
  description: BC ICMS = VL_ITEM - VL_DESC (quando tributado e BC declarada > 0)
  condition: '|VL_ITEM - VL_DESC - VL_BC_ICMS| > tolerancia'
  implemented: true
  module: tax_recalc.py
- id: RECALC_ICMS_VALOR
  register: C170
  fields:
  - VL_ICMS
  - VL_BC_ICMS
  - ALIQ_ICMS
  error_type: CALCULO_DIVERGENTE
  severity: critical
  description: VL_ICMS = VL_BC_ICMS * ALIQ_ICMS / 100
  condition: '|VL_BC_ICMS * ALIQ_ICMS / 100 - VL_ICMS| > tolerancia'
  implemented: true
  module: tax_recalc.py
- id: RECALC_ICMS_ST_FALTANTE
  register: C170
  fields:
  - VL_ICMS_ST
  - VL_BC_ICMS_ST
  - CST_ICMS
  error_type: CALCULO_DIVERGENTE
  severity: critical
  description: Para CSTs de ST (10,30,60,70), BC_ST > 0 exige VL_ICMS_ST > 0
  condition: CST in ST AND VL_BC_ST > 0 AND VL_ICMS_ST = 0
  implemented: true
  module: tax_recalc.py
- id: RECALC_ICMS_ST_VALOR
  register: C170
  fields:
  - VL_ICMS_ST
  - VL_BC_ICMS_ST
  - ALIQ_ST
  error_type: CALCULO_DIVERGENTE
  severity: critical
  description: VL_ICMS_ST = VL_BC_ICMS_ST * ALIQ_ST / 100
  condition: '|calculado - declarado| > tolerancia (quando ALIQ_ST > 0)'
  implemented: true
  module: tax_recalc.py
- id: RECALC_IPI
  register: C170
  fields:
  - VL_IPI
  - VL_BC_IPI
  - ALIQ_IPI
  error_type: CALCULO_DIVERGENTE
  severity: critical
  description: VL_IPI = VL_BC_IPI * ALIQ_IPI / 100
  condition: '|calculado - declarado| > tolerancia'
  implemented: true
  module: tax_recalc.py
- id: RECALC_PIS
  register: C170
  fields:
  - VL_PIS
  - VL_BC_PIS
  - ALIQ_PIS
  error_type: CALCULO_DIVERGENTE
  severity: critical
  description: VL_PIS = VL_BC_PIS * ALIQ_PIS / 100
  condition: '|calculado - declarado| > tolerancia (quando BC > 0 e ALIQ > 0)'
  implemented: true
  module: tax_recalc.py
- id: RECALC_COFINS
  register: C170
  fields:
  - VL_COFINS
  - VL_BC_COFINS
  - ALIQ_COFINS
  error_type: CALCULO_DIVERGENTE
  severity: critical
  description: VL_COFINS = VL_BC_COFINS * ALIQ_COFINS / 100
  condition: '|calculado - declarado| > tolerancia (quando BC > 0 e ALIQ > 0)'
  implemented: true
  module: tax_recalc.py
- id: RECALC_E110_TOTAIS
  register: E110
  fields:
  - VL_TOT_DEBITOS
  - VL_TOT_CREDITOS
  error_type: CALCULO_DIVERGENTE
  severity: critical
  description: Totais E110 recalculados a partir de C190 + D690
  condition: '|soma(C190+D690) - E110| > tolerancia'
  implemented: true
  module: tax_recalc.py
cst_isencoes:
- id: CST_ICMS_CODIGO_INVALIDO
  register: C170
  fields:
  - CST_ICMS
  error_type: CST_INVALIDO
  severity: error
  description: 'CST ICMS deve ser codigo valido: 2 digitos (Tabela B) ou 3 digitos (origem 0-8 + Tabela B) ou CSOSN'
  condition: CST nao pertence a lista de codigos validos
  implemented: true
  module: cst_validator.py
- id: CST_ICMS_ISENCAO_COM_VALOR
  register: C170
  fields:
  - CST_ICMS
  - VL_BC_ICMS
  - VL_ICMS
  error_type: ISENCAO_INCONSISTENTE
  severity: error
  description: CST isento/NT (40,41,50,60) deve ter BC e ICMS zerados
  condition: CST in (40,41,50,60) AND (VL_BC_ICMS > 0 OR VL_ICMS > 0)
  implemented: true
  module: cst_validator.py
- id: CST_ICMS_TRIBUTADO_SEM_ICMS
  register: C170
  fields:
  - CST_ICMS
  - VL_BC_ICMS
  - VL_ICMS
  error_type: TRIBUTACAO_INCONSISTENTE
  severity: error
  description: CST tributado (00,10,20,70,90) com BC > 0 deve ter ICMS > 0
  condition: CST in (00,10,20,70,90) AND VL_BC_ICMS > 0 AND VL_ICMS = 0
  implemented: true
  module: cst_validator.py
- id: H010_ITEM_INEXISTENTE
  register: H010
  fields:
  - COD_ITEM
  error_type: REF_INEXISTENTE
  severity: warning
  description: COD_ITEM do H010 deve existir no cadastro 0200
  condition: COD_ITEM nao encontrado no 0200
  implemented: true
  module: cst_validator.py
- id: H010_QTD_NEGATIVA
  register: H010
  fields:
  - QTD
  error_type: VALOR_NEGATIVO
  severity: error
  description: Quantidade do inventario nao pode ser negativa
  condition: QTD < 0
  implemented: true
  module: cst_validator.py
- id: H010_VALOR_NEGATIVO
  register: H010
  fields:
  - VL_ITEM
  error_type: VALOR_NEGATIVO
  severity: error
  description: Valor do item no inventario nao pode ser negativo
  condition: VL_ITEM < 0
  implemented: true
  module: cst_validator.py
semantica_aliquota_zero:
- id: ICMS_CST_TRIBUTADO_BC_ALIQ_ZERO
  register: C170
  fields:
  - CST_ICMS
  - VL_BC_ICMS
  - ALIQ_ICMS
  error_type: CST_ALIQ_ZERO_FORTE
  severity: warning
  description: CST tributado com BC preenchida mas aliquota zero (provavel erro de parametrizacao)
  condition: CST in (00,10,20,70,90) AND VL_BC > 0 AND ALIQ = 0 AND CFOP nao e exportacao/remessa
  implemented: true
  module: fiscal_semantics.py
- id: ICMS_CST_TRIBUTADO_TUDO_ZERO
  register: C170
  fields:
  - CST_ICMS
  - VL_BC_ICMS
  - ALIQ_ICMS
  - VL_ICMS
  error_type: CST_ALIQ_ZERO_MODERADO
  severity: info
  description: CST tributado com base, aliquota e imposto todos zerados (classificacao possivelmente incorreta)
  condition: CST in (00,10,20,70,90) AND BC=0 AND ALIQ=0 AND ICMS=0 AND CFOP nao e exportacao/remessa
  implemented: true
  module: fiscal_semantics.py
- id: IPI_CST_TRIBUTADO_TUDO_ZERO
  register: C170
  fields:
  - CST_IPI
  - VL_BC_IPI
  - ALIQ_IPI
  - VL_IPI
  error_type: IPI_CST_ALIQ_ZERO
  severity: info
  description: CST_IPI tributado com base, aliquota e valor todos zerados
  condition: CST_IPI in (00,01,49,50,99) AND BC=0 AND ALIQ=0 AND VL=0
  implemented: true
  module: fiscal_semantics.py
- id: PIS_CST_TRIBUTAVEL_TUDO_ZERO
  register: C170
  fields:
  - CST_PIS
  - VL_BC_PIS
  - ALIQ_PIS
  - VL_PIS
  error_type: PIS_CST_ALIQ_ZERO
  severity: info
  description: CST_PIS tributavel com base, aliquota e valor todos zerados
  condition: CST_PIS in (01,02,03,49) AND BC=0 AND ALIQ=0 AND VL=0
  implemented: true
  module: fiscal_semantics.py
- id: COFINS_CST_TRIBUTAVEL_TUDO_ZERO
  register: C170
  fields:
  - CST_COFINS
  - VL_BC_COFINS
  - ALIQ_COFINS
  - VL_COFINS
  error_type: COFINS_CST_ALIQ_ZERO
  severity: info
  description: CST_COFINS tributavel com base, aliquota e valor todos zerados
  condition: CST_COFINS in (01,02,03,49) AND BC=0 AND ALIQ=0 AND VL=0
  implemented: true
  module: fiscal_semantics.py
semantica_cst_cfop:
- id: CFOP_VENDA_CST_ISENTO
  register: C170
  fields:
  - CST_ICMS
  - CFOP
  error_type: CST_CFOP_INCOMPATIVEL
  severity: warning
  description: CFOP de venda com CST isento/NT sem justificativa
  condition: CFOP in CFOPs_venda AND CST in (40,41,50,60)
  implemented: true
  module: fiscal_semantics.py
- id: CFOP_INTERESTADUAL_ALIQ_ZERO
  register: C170
  fields:
  - CST_ICMS
  - CFOP
  - ALIQ_ICMS
  error_type: CST_CFOP_INCOMPATIVEL
  severity: warning
  description: Operacao interestadual com CST tributado e aliquota zero (deveria ser 4%, 7% ou 12%)
  condition: CFOP inicia com 2/6 AND CST tributado AND ALIQ=0 AND nao e remessa/devolucao
  implemented: true
  module: fiscal_semantics.py
- id: CFOP_EXPORTACAO_CST_TRIBUTADO
  register: C170
  fields:
  - CST_ICMS
  - CFOP
  - ALIQ_ICMS
  error_type: CST_CFOP_INCOMPATIVEL
  severity: warning
  description: Exportacao com CST tributado e aliquota > 0 (exportacao tem imunidade)
  condition: CFOP in CFOPs_exportacao AND CST tributado AND ALIQ > 0
  implemented: true
  module: fiscal_semantics.py
monofasicos:
- id: MONO_ALIQ_INVALIDA
  register: C170
  fields:
  - CST_PIS
  - CST_COFINS
  - ALIQ_PIS
  - ALIQ_COFINS
  error_type: MONOFASICO_ALIQ_INVALIDA
  severity: error
  description: CST 04 (monofasico) na revenda exige aliquota zero (tributo ja recolhido na origem)
  condition: CST_PIS=04 AND ALIQ_PIS > 0; OU CST_COFINS=04 AND ALIQ_COFINS > 0
  implemented: true
  module: fiscal_semantics.py
  legislation: Lei 10.147/00, Lei 10.485/02, Lei 10.833/03 Arts. 49-52
- id: MONO_VALOR_INDEVIDO
  register: C170
  fields:
  - CST_PIS
  - CST_COFINS
  - VL_PIS
  - VL_COFINS
  error_type: MONOFASICO_VALOR_INDEVIDO
  severity: error
  description: CST 04 (monofasico) na revenda exige valor zero de PIS/COFINS
  condition: CST_PIS=04 AND VL_PIS > 0; OU CST_COFINS=04 AND VL_COFINS > 0
  implemented: true
  module: fiscal_semantics.py
  legislation: Lei 10.147/00, Lei 10.485/02
- id: MONO_NCM_INCOMPATIVEL
  register: C170
  fields:
  - CST_PIS
  - CST_COFINS
  - NCM
  error_type: MONOFASICO_NCM_INCOMPATIVEL
  severity: warning
  description: CST 04 informado mas NCM do produto nao consta na lista de monofasicos
  condition: CST=04 AND NCM (via 0200) nao pertence a nenhuma categoria monofasica
  implemented: true
  module: fiscal_semantics.py
  legislation: Lei 10.147/00, Lei 10.485/02, Lei 10.833/03, Lei 10.865/04
- id: MONO_CST_INCORRETO
  register: C170
  fields:
  - CST_PIS
  - CST_COFINS
  - NCM
  - CFOP
  error_type: MONOFASICO_CST_INCORRETO
  severity: warning
  description: NCM monofasico na revenda (saida) deveria usar CST 04, mas esta com CST tributavel
  condition: NCM monofasico AND CST in (01,02,03) AND CFOP de saida
  implemented: true
  module: fiscal_semantics.py
  legislation: Lei 10.147/00, Lei 10.485/02
- id: MONO_ENTRADA_CST04
  register: C170
  fields:
  - CST_PIS
  - CST_COFINS
  - CFOP
  error_type: MONOFASICO_ENTRADA_CST04
  severity: info
  description: CST 04 em entrada pode indicar revenda sem credito ou erro de classificacao
  condition: CST=04 AND CFOP inicia com 1/2/3
  implemented: true
  module: fiscal_semantics.py
